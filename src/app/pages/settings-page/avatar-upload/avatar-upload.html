<img [src]="preview()" alt="" class="avatar">

<div
  dnd
  class="dropzone"
  tabindex="0"
  (keyup.enter)="fileDrop.click()"
  (fileDropped)="onFileDroped($event)"
>

  <div class="dropzone-content">
    <img src="/assets/svg/upload.svg" alt="">
    <span class="medium-text"> Перетащите изображение или Загрузите (разрешение до 5,000 x 5,000 px)</span>
  </div>

  <input
    tabindex="-1"
    type="file"
    class="avatar-input"
    [(ngModel)]="avatar"
    #fileDrop
    (change)="fileBrowserHandler($event)"
  >
</div>
